server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    include /etc/nginx/snippets/security-headers.inc;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sem add_header aqui, herda os cabeçalhos do server. Se definir add_header,
    # incluir de novo security-headers.inc (comportamento do Nginx).
    location = /index.html {
        include /etc/nginx/snippets/security-headers.inc;
        add_header Cache-Control "no-cache" always;
    }
}

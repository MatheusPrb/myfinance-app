# O volume frontend_node_modules guarda node_modules no Docker.
# Ao mudar package.json, o entrypoint roda `npm install` em cada subida; ou: docker compose exec frontend npm install
services:
  frontend:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_DEV_API_PROXY: http://host.docker.internal:8080
    stdin_open: true
    tty: true

volumes:
  frontend_node_modules:
